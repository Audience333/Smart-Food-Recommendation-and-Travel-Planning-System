<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菏泽美食推荐与城市漫游规划系统</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://webapi.amap.com/loader.js"></script>
</head>
<body>
    <div class="header">
        <h1>菏泽美食推荐与城市漫游规划系统</h1>
        <p>基于 C++ 数据结构 + 高德地图可视化</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="panel">
                <h3>图层控制</h3>
                <div class="control-group">
                    <label class="toggle">
                        <input type="checkbox" id="toggleFood" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">美食标记</span>
                    </label>
                    <label class="toggle">
                        <input type="checkbox" id="toggleSpot" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">景点标记</span>
                    </label>
                    <label class="toggle">
                        <input type="checkbox" id="toggleRoute" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">推荐路线</span>
                    </label>
                </div>
            </div>

            <div class="panel">
                <h3>数据统计</h3>
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-value" id="foodCount">0</span>
                        <span class="stat-label">美食数量</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="spotCount">0</span>
                        <span class="stat-label">景点数量</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="routeDistance">0</span>
                        <span class="stat-label">路线距离(km)</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="routeTime">0</span>
                        <span class="stat-label">预计时间(分)</span>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>推荐路线</h3>
                <div id="routeInfo" class="route-info">
                    <p class="loading">加载中...</p>
                </div>
            </div>

            <div class="panel">
                <h3>美食分类</h3>
                <div class="category-filters" id="categoryFilters"></div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
            <div class="map-controls">
                <button id="btnZoomIn" title="放大">+</button>
                <button id="btnZoomOut" title="缩小">-</button>
                <button id="btnReset" title="重置视图">R</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>菏泽美食推荐与城市漫游规划系统</span>
        <span>C++ 数据结构课程设计</span>
    </div>

    <script src="map.js"></script>
</body>
</html>
