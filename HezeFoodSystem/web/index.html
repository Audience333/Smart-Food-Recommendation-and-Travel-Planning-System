<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菏泽美食推荐与城市漫游规划系统</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://webapi.amap.com/loader.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="header-title">
                <h1>菏泽美食推荐与城市漫游规划系统</h1>
                <p>基于 C++ 数据结构 + 高德地图可视化</p>
            </div>
            <div class="header-tools">
                <div class="header-tool-group">
                    <button id="btnHistoryUndo" class="header-tool-btn">&#x2190; 撤销</button>
                    <button id="btnHistoryRedo" class="header-tool-btn">重做 &#x2192;</button>
                    <button class="header-tool-btn" id="btnHistoryDropdown">&#x25BC; 历史</button>
                    <div id="historyDropdown" class="header-dropdown" style="display:none;">
                        <div class="header-dropdown-header"><span>操作历史</span><span id="btnHistoryClear" class="header-dropdown-clear">清空</span></div>
                        <div id="historyDropdownList" class="header-dropdown-list"></div>
                    </div>
                </div>
                <div class="header-tool-group header-dropdown-trigger" id="favoritesPanel">
                    <button class="header-tool-btn">&#9733; 收藏 <span id="favoritesCount">(0)</span></button>
                    <div class="header-dropdown" style="display:none;">
                        <div id="favoritesList" class="header-dropdown-list"><div class="favorites-empty">暂无收藏</div></div>
                    </div>
                </div>
                <div class="header-tool-group header-dropdown-trigger" id="rankingsPanel">
                    <button class="header-tool-btn">排行</button>
                    <div class="header-dropdown" style="display:none;">
                        <div class="ranking-tabs">
                            <span class="ranking-tab active" data-tab="popular">人气</span>
                            <span class="ranking-tab" data-tab="value">性价比</span>
                            <span class="ranking-tab" data-tab="favorites">收藏</span>
                            <span class="ranking-sort-btn" id="btnRankSort" title="切换正序/倒序">↓</span>
                        </div>
                        <div id="rankingList" class="ranking-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="panel collapsed">
                <h3 class="panel-header">图层控制 <span class="panel-toggle">▼</span></h3>
                <div class="panel-body">
                <div class="control-group">
                    <div class="toggle-btn-row">
                        <button id="btnToggleFood" class="toggle-btn active">美食标记</button>
                        <button id="btnToggleSpot" class="toggle-btn active">景点标记</button>
                        <button id="btnOpenOnly" class="toggle-btn">仅营业中</button>
                    </div>
                </div>
                </div>
            </div>

            <div class="panel collapsed">
                <h3 class="panel-header">搜索 <span class="panel-toggle">▼</span></h3>
                <div class="panel-body">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索名称、地址或标签...">
                    <div class="search-type">
                        <span class="search-type-tag active" data-type="all">全部</span>
                        <span class="search-type-tag" data-type="food">美食</span>
                        <span class="search-type-tag" data-type="spot">景点</span>
                    </div>

                </div>
                <div id="searchResults" class="search-results" style="display:none;">
                    <div class="search-results-header">
                        <span id="searchResultCount">0</span> 个结果
                    </div>
                    <div id="searchResultList" class="search-result-list"></div>
                </div>
                </div>
            </div>

            <div class="panel collapsed">
                <h3 class="panel-header">数据统计 <span class="panel-toggle">▼</span></h3>
                <div class="panel-body">
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-value" id="foodCount">0</span>
                        <span class="stat-label">美食数量</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="spotCount">0</span>
                        <span class="stat-label">景点数量</span>
                    </div>
                </div>
                </div>
            </div>

            <div class="panel collapsed">
                <h3 class="panel-header">路线规划 <span class="panel-toggle">▼</span></h3>
                <div class="panel-body">
                <div class="route-planner">
                    <div class="route-mode">
                        <span class="route-mode-btn active" data-mode="driving">驾车</span>
                        <span class="route-mode-btn" data-mode="walking">步行</span>
                    </div>
                    <div class="route-select">
                        <label class="route-select-label">起点</label>
                        <select id="routeStart" class="route-select-input">
                            <option value="">-- 选择起点 --</option>
                        </select>
                    </div>
                    <div class="route-select">
                        <label class="route-select-label">途经点 <span style="font-size:11px;color:#999;">(最多5个)</span></label>
                        <div id="routeWaypoints" class="route-waypoints"></div>
                        <button id="btnAddWaypoint" class="route-add-btn">+ 添加途经点</button>
                    </div>
                    <div class="route-select">
                        <label class="route-select-label">终点</label>
                        <select id="routeEnd" class="route-select-input">
                            <option value="">-- 选择终点 --</option>
                        </select>
                    </div>
                    <div class="route-sort">
                        <label class="route-select-label">排序策略</label>
                        <div class="route-mode">
                            <span class="route-mode-btn active" data-sort="time">时间优先</span>
                            <span class="route-mode-btn" data-sort="distance">距离优先</span>
                            <span class="route-mode-btn" data-sort="toll">过路费少</span>
                        </div>
                    </div>
                    <div class="route-actions">
                        <button id="btnPlanRoute" class="route-plan-btn">规划路线</button>
                        <button id="btnClearRoute" class="route-clear-btn">清空</button>
                    </div>
                </div>
                <div id="routeDetail" class="route-detail" style="display:none;">
                    <div id="routeSummary" class="route-summary"></div>
                    <div id="routeSegments" class="route-segments"></div>
                </div>
                </div>
            </div>

            <div class="panel collapsed">
                <h3 class="panel-header">美食分类 <span class="panel-toggle">▼</span></h3>
                <div class="panel-body">
                <div class="category-filters" id="categoryFilters"></div>
                </div>
            </div>

            <div class="panel collapsed">
                <h3 class="panel-header">用户画像 <span class="panel-toggle">▼</span></h3>
                <div class="panel-body">
                    <div style="margin-bottom:8px;">
                        <button id="btnEditProfile" class="panel-action-btn">编辑</button>
                        <button id="btnRestoreProfile" class="panel-action-btn" style="display:none;">恢复</button>
                    </div>
                    <div id="profilePanel" class="profile-content">
                    <div class="profile-empty">收藏美食后可查看画像</div>
                </div>
                </div>
            </div>

            <div class="panel collapsed">
                <h3 class="panel-header">一日游推荐 <span class="panel-toggle">▼</span></h3>
                <div class="panel-body">
                    <div style="margin-bottom:8px;text-align:right;">
                        <button id="btnRefreshTour" class="panel-action-btn">换一批</button>
                    </div>
                    <div id="dailyTourList" class="daily-tour-content">
                    <div class="profile-empty">收藏POI后可生成推荐</div>
                </div>
                </div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>

<div class="map-controls">
                <button id="btnZoomIn" title="放大">+</button>
                <button id="btnZoomOut" title="缩小">-</button>
                <button id="btnReset" title="重置视图">R</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>菏泽美食推荐与城市漫游规划系统</span>
        <span>C++ 数据结构课程设计</span>
    </div>

    <script src="map.js"></script>
</body>
</html>
